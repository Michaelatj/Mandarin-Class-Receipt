{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}

{% block body %}
<div class="form-title">Set New Password</div>
<p style="font-size:.83rem;color:var(--text3);margin-bottom:18px;line-height:1.5">
  Code verified! Choose a new password for <strong style="color:var(--text)">{{ username }}</strong>.
</p>
<form method="POST" action="{{ url_for('auth.reset_password') }}">
  <label>New Password</label>
  <input type="password" name="new_password" placeholder="At least 6 characters"
         required minlength="6" autocomplete="new-password">
  <label>Confirm New Password</label>
  <input type="password" name="confirm_password" placeholder="Repeat new password"
         required minlength="6" autocomplete="new-password">
  <button class="btn br">Reset Password →</button>
</form>
{% endblock %}
