{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block body %}
<div class="form-title">Forgot Password</div>
<p style="font-size:.83rem;color:var(--text3);margin-bottom:18px;line-height:1.5">
  Enter your username and we'll send a reset code to your registered email.
</p>
<form method="POST" action="{{ url_for('auth.forgot_password') }}">
  <label>Username</label>
  <input type="text" name="username" placeholder="your username" required autocomplete="username">
  <button class="btn br">Send Reset Code →</button>
</form>
<div class="dvd"></div>
<a href="{{ url_for('auth.login') }}" class="btn bgh" style="display:block;text-align:center">
  ← Back to Login
</a>
{% endblock %}
