{% with messages = get_flashed_messages(with_categories=True) %}
  {% if messages %}
    {% for category, message in messages %}
    <div class="alert {{ 'alert-ok' if category in ('ok','success','message') else 'alert-err' }}" style="margin-bottom:12px">
      {{ message }}
    </div>
    {% endfor %}
  {% endif %}
{% endwith %}
